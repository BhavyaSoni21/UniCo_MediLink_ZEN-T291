name: medilink

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api/Dockerfile
    env_file:
      - ../../.env
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  ai-service:
    build:
      context: ../../services/ai-service
      dockerfile: ../../infra/docker/ai-service/Dockerfile
    env_file:
      - ../../.env
    environment:
      AI_SERVICE_PORT: 8000
    ports:
      - "8000:8000"

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web/Dockerfile
    env_file:
      - ../../.env
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - web

volumes:
  redis_data:
  minio_data:
