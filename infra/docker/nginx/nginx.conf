events {}

http {
  upstream api_upstream {
    server api:3000;
  }

  upstream web_upstream {
    server web:3001;
  }

  server {
    listen 80;

    # api's /health lives outside the api/v1 prefix (infra health checks
    # conventionally bypass API versioning), so it needs its own route
    # rather than falling through the generic /api/ passthrough below.
    location = /health {
      proxy_pass http://api_upstream/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://web_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
